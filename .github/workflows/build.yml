name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install Flet
        run: pip install flet

      - name: Build APK
        run: |
          flet build apk \
          --name "Age Calculator" \
          --icon icon.png \
          --splash-image icon.png \
          --splash-color "#1A1C1E"

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: AgeCalculator-APK
          path: build/apk/
